<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小白酒馆</title>
    <style>
        html,
        body,
        #app {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #151311;
        }

        #xb-frame-boot {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: grid;
            place-items: center;
            background: #151311;
            color: #b8b2a6;
            font: 13px/1.4 "Segoe UI", "Microsoft YaHei UI", sans-serif;
            transition: opacity 180ms ease;
        }

        #app:not(:empty) ~ #xb-frame-boot {
            opacity: 0;
            pointer-events: none;
        }

        .xb-frame-boot-core {
            display: grid;
            justify-items: center;
            gap: 12px;
        }

        .xb-frame-boot-ring {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(184, 178, 166, 0.22);
            border-top-color: #b8b2a6;
            border-radius: 50%;
            animation: xb-frame-boot-spin 800ms linear infinite;
        }

        .xb-frame-boot-text {
            color: rgba(184, 178, 166, 0.72);
        }

        .xb-frame-boot-hint {
            color: rgba(184, 178, 166, 0.48);
            font-size: 12px;
        }

        @keyframes xb-frame-boot-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>
    <div id="xb-frame-boot" role="status" aria-live="polite">
        <div class="xb-frame-boot-core">
            <div class="xb-frame-boot-ring" aria-hidden="true"></div>
            <div class="xb-frame-boot-text">正在加载</div>
            <div class="xb-frame-boot-hint">首次加载需约30s</div>
        </div>
    </div>
    <script>
        const version = new URLSearchParams(location.search).get('v') || '';
        const suffix = version ? `?v=${encodeURIComponent(version)}` : '';
        const stylesheet = document.createElement('link');
        stylesheet.rel = 'stylesheet';
        stylesheet.href = `./dist/tavern-app.css${suffix}`;
        document.head.appendChild(stylesheet);
        const script = document.createElement('script');
        script.type = 'module';
        script.src = `./dist/tavern-app.js${suffix}`;
        script.onerror = () => {
            const text = document.querySelector('#xb-frame-boot .xb-frame-boot-text');
            const hint = document.querySelector('#xb-frame-boot .xb-frame-boot-hint');
            if (text) text.textContent = '加载失败，请刷新重试';
            if (hint) hint.textContent = '';
        };
        document.body.appendChild(script);
    </script>
</body>
</html>
