<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>小白电纸书</title>
    <style>
        html,
        body,
        #xb-ebook-root {
            width: 100%;
            height: 100%;
            margin: 0;
            background: #fff9ed;
        }

        #xb-frame-boot {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: grid;
            place-items: center;
            background: #fff9ed;
            color: #2f2418;
            font: 13px/1.4 "Segoe UI", "Microsoft YaHei UI", sans-serif;
            transition: opacity 180ms ease;
        }

        #xb-ebook-root:not(:empty) ~ #xb-frame-boot {
            opacity: 0;
            pointer-events: none;
        }

        .xb-frame-boot-core {
            display: grid;
            justify-items: center;
            gap: 12px;
        }

        .xb-frame-boot-ring {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(47, 36, 24, 0.18);
            border-top-color: #2f2418;
            border-radius: 50%;
            animation: xb-frame-boot-spin 800ms linear infinite;
        }

        .xb-frame-boot-text {
            color: rgba(47, 36, 24, 0.66);
        }

        @keyframes xb-frame-boot-spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div id="xb-ebook-root"></div>
    <div id="xb-frame-boot" role="status" aria-live="polite">
        <div class="xb-frame-boot-core">
            <div class="xb-frame-boot-ring" aria-hidden="true"></div>
            <div class="xb-frame-boot-text">正在加载</div>
        </div>
    </div>
    <script>
    (function() {
        var v = new URLSearchParams(location.search).get('v') || '';
        var s = document.createElement('script');
        s.type = 'module';
        s.src = './dist/ebook-app.js' + (v ? '?v=' + encodeURIComponent(v) : '');
        s.onerror = function() {
            var text = document.querySelector('#xb-frame-boot .xb-frame-boot-text');
            if (text) text.textContent = '加载失败，请刷新重试';
        };
        document.head.appendChild(s);
    })();
</script>
</body>
</html>
